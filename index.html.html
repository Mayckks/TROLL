<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parabéns! Gift Card R$100</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: url('https://s2-techtudo.glbimg.com/Jeoz9zBNLopOsXB9M1cdY4Qg0Jg=/0x0:1200x675/984x0/smart/filters:strip_icc()/s.glbimg.com/po/tt2/f/original/2023/12/21/gift_card.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(8px);
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      background: #fff;
      padding: 30px 20px;
      max-width: 400px;
      width: 90%;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 15px;
      animation: piscar 1.5s infinite;
    }

    @keyframes piscar {
      0%, 100% { color: red; }
      50% { color: transparent; }
    }

    p {
      margin-bottom: 20px;
      font-size: 1.1rem;
      color: #333;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: left;
    }

    label {
      font-weight: bold;
      font-size: 0.95rem;
    }

    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    input[type="submit"] {
      background-color: #2d8f2d;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    input[type="submit"]:hover {
      background-color: #246e24;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Parabéns!</h1>
    <p>Você foi selecionado para ganhar um Gift Card de <strong>R$100</strong>!</p>
    <p>Preencha os dados abaixo para resgatar seu prêmio:</p>

    <form id="giftForm">
      <label>Nome completo:</label>
      <input type="text" id="nome" required />

      <label>E-mail:</label>
      <input type="email" id="email" required />

      <label>Telefone:</label>
      <input type="tel" id="telefone" placeholder="(99) 99999-9999" required />

      <label>CPF:</label>
      <input 
        type="text" 
        id="cpf" 
        placeholder="000.000.000-00"
        maxlength="11"
        inputmode="numeric"
        required
      />

      <input type="submit" value="Resgatar Gift Card" />
    </form>
  </div>

  <script>
    const cpfInput = document.getElementById('cpf');

    // Permite apenas números
    cpfInput.addEventListener('input', () => {
      cpfInput.value = cpfInput.value.replace(/\D/g, '');
    });

    document.getElementById('giftForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const cpf = cpfInput.value.trim();

      if (cpf.length !== 11) {
        alert('CPF deve conter exatamente 11 números.');
        return;
      }

      if (nome && email && telefone && cpf) {
        window.location.href = 'https://youtube.com/shorts/rLowlHIj7Qk?si=EdpdKZxVuXubtNk_';
      } else {
        alert('Preencha todos os campos corretamente.');
      }
    });
  </script>
</body>
</html>
